<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fala Votorantim - Dashboard ADM</title>

    <!-- Bootstrap: biblioteca de estilos prontos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Estilos do projeto -->
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/Dashboard.css">

    <!-- Chart.js: biblioteca para criar gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

    <!-- Div que envolve o menu lateral e o conteúdo principal lado a lado -->
    <div class="telaPrincipal">

        <!-- Menu lateral — o conteúdo é carregado pelo PuxarHeaderFooter.js -->
        <aside id="menuLateral"></aside>

        <!-- Área principal da página, ao lado direito do menu -->
        <main class="carragarConteudo">

            <!-- Título e subtítulo da página -->
            <h1 id="PessoaCargo">Admin</h1>
            <h3 id="SubtituloPáginaAtual">Dashboard</h3>

            <!-- 
                 CARDS DE MÉTRICAS
                 Mostram os números rápidos no topo
                  -->
            <div class="alinhasDenuncias">

                <div class="DenunciasHoje">
                    <h2 id="qtdHoje">1</h2>
                    <p>Denuncias Hoje</p>
                </div>

                <div class="DenunciasResolvidas">
                    <h2 id="qtdResolvidas">1</h2>
                    <p>Resolvidas</p>
                </div>

                <div class="DenunciasPendentes">
                    <h2 id="qtdPendentes">1</h2>
                    <p>Pendentes</p>
                </div>

                <!-- Card do timer — começa em 00:00:00 e conta o tempo na página -->
                <div class="TempoMedio">
                    <h2 id="tempoMedio">00:00:00</h2>
                    <p>Tempo</p>
                </div>

            </div>

            <!-- 
                 GRÁFICOS
                 Dois gráficos lado a lado
                  -->
            <div class="areaGraficos">

                <!-- Gráfico de barras: denúncias por ano -->
                <div class="graficoCard">
                    <h2>Denuncias por ano</h2>
                    <!-- O canvas é onde o Chart.js vai desenhar o gráfico -->
                    <div class="graficoWrapper">
                        <canvas id="graficoPorAno"></canvas>
                    </div>
                </div>

                <!-- Gráfico de rosca: denúncias por tipo -->
                <div class="graficoCard">
                    <h2>Denuncias por Tipo</h2>
                    <div class="graficoWrapper donuts">
                        <!-- Legenda colorida gerada pelo JavaScript -->
                        <div class="legendaTipo" id="legendaTipo"></div>
                        <canvas id="graficoPorTipo"></canvas>
                    </div>
                </div>

            </div>

        </main>
    </div>

    <footer id="footer"></footer>

    <script src="funcionalidades/PuxarHeaderFooter.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>

       
        // GRÁFICO DE BARRAS — Denuncias por Ano
        

        // Pega o elemento canvas pelo id e prepara para receber o gráfico
        const ctxAnos = document.getElementById('graficoPorAno').getContext('2d');

        new Chart(ctxAnos, {
            type: 'bar', // tipo barra
            data: {
                labels: ['2025', '2024', '2023', '2022'], // anos no eixo X
                datasets: [{
                    data: [11500, 10250, 10200, 6780],    // valores de cada barra
                    backgroundColor: ['#FFA500', '#FFA500', '#6A5ACD', '#1C3CD5'], // cor de cada barra
                    borderRadius: 4 // borda arredondada nas barras
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false } // esconde a legenda padrão do Chart.js
                },
                scales: {
                    x: { grid: { display: false } }, // sem linhas de grade no eixo X
                    y: { grid: { color: '#E9F0FF' } }  // linhas de grade azul claro no eixo Y
                }
            }
        });


        
        // GRÁFICO DE ROSCA — Denuncias por Tipo
        
        // Lista de tipos de denúncia com nome e cor
        const tipos = [
            { label: 'Buraco', color: '#6A5ACD' },
            { label: 'Cano',   color: '#1C3CD5' },
            { label: 'Buraco', color: '#FFA500' },
            { label: 'Buraco', color: '#B0E0A0' },
            { label: 'Buraco', color: '#B0B0B0' }
        ];

        const ctxTipo = document.getElementById('graficoPorTipo').getContext('2d');

        new Chart(ctxTipo, {
            type: 'doughnut', // tipo rosca
            data: {
                labels: tipos.map(t => t.label),          // nomes dos tipos
                datasets: [{
                    data: [35, 25, 20, 12, 8],             // porcentagem de cada tipo
                    backgroundColor: tipos.map(t => t.color), // cores dos fatias
                    borderWidth: 2,
                    borderColor: '#ffffff'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '65%', // tamanho do buraco no centro da rosca
                plugins: {
                    legend: { display: false } // esconde a legenda padrão
                }
            }
        });

        // Cria a legenda colorida manualmente abaixo/ao lado da rosca
        const legendaEl = document.getElementById('legendaTipo');
        tipos.forEach(t => {
            legendaEl.innerHTML += `
                <div class="legendaItem">
                    <span class="legendaCor" style="background:${t.color}"></span>
                    <span>${t.label}</span>
                </div>`;
        });


        

    </script>
</body>
</html>
